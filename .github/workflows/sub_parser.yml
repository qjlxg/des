name: sub_parser

on:
  workflow_dispatch:
  push:
    paths:
      - 'sub_parser.py'
      - '.github/workflows/sub_parser.yml'
  schedule:
    - cron: '0 16 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Local Repo
        uses: actions/checkout@v4

      - name: Checkout Private Repo (Config Only)
        uses: actions/checkout@v4
        with:
          repository: qjlxg/362
          token: ${{ secrets.GH_TOKEN }}
          path: private_folder

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Deps
        run: pip install requests maxminddb PyYAML aiohttp geoip2

      - name: Execute
        env:
          TZ: Asia/Shanghai
          # 关键修改：将路径设为当前仓库下的 data 目录
          DATA_PATH: data
          LINK: ${{ secrets.LINK }}
        run: |
          # 运行前先创建目录，防止脚本因找不到路径报错
          mkdir -p data
          python sub_parser.py

      - name: Push to Local Repo
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "NodeParserBot"
          
          # 即使 data 下没有新文件，这里也不会报错中止
          git add data/ || echo "No changes to add"

          # 检查是否有文件变动，如果有则提交并推送
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update nodes: $(date +'%Y-%m-%d %H:%M')" && git push)
