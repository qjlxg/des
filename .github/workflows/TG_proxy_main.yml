name: TG_proxy_main

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2,14 * * *"
  push:
    branches:
      - main
    paths:
      - 'TG_proxy_main.py'
      - 'trial.cfg'
      - '.github/workflows/TG_proxy_main.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 迁出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          

      - name: 设置北京时间
        run: sudo timedatectl set-timezone 'Asia/Shanghai'

      - name: 安装系统依赖（修复 libGL.so.1 错误）
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender-dev

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            curl_cffi \
            ddddocr \
            opencv-python-headless \
            numpy \
            pillow \
            onnxruntime

      - name: 执行机场注册任务
        run: python ./TG_proxy_main.py
        timeout-minutes: 35

      - name: 提交并推送更新
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git pull origin main --rebase || true

          # 添加脚本实际生成的文件
          git add nodes_plain.txt subscription.txt tg.cache || true

          if git diff --staged --quiet; then
            echo "✅ 没有文件变更，跳过提交。"
          else
            git commit -m "$(date '+%Y-%m-%d %H:%M:%S') 自动更新订阅节点与缓存"
            git push origin main
          fi