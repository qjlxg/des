name: TG_proxy_main.yml

# 触发条件
on:
  workflow_dispatch: # 支持手动触发运行
  schedule:
    # 每天北京时间 10:00 和 22:00 运行 (对应 UTC 2:00, 14:00)
    - cron: "0 2,14 * * *"
  push:
    # 当以下文件发生变动并推送到 main 分支时自动触发
    branches:
      - main
    paths:
      - 'TG_proxy_main.py'
      - '.github/workflows/TG_proxy_main.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 迁出代码
      uses: actions/checkout@v2

    - name: 安装Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: 加载缓存
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 设置时区
      run: sudo timedatectl set-timezone 'Asia/Shanghai'

    - name: 安装依赖
      run: |
        pip install requests

    - name: 执行任务
      run: |
        python ./TG_proxy_main.py
      
    - name: 提交更改
      run: |                 
        git config --local user.email '${{ secrets.EMAIL }}'
        git config --local user.name '${{ secrets.NAME }}'
        git pull origin main
        
        # 仅当生成了 trial_subscriptions.txt 时才提交
        if [ -f "./trial_subscriptions.txt" ]; then
          git add ./trial_subscriptions.txt
          # 检查是否有文件变动，避免提交空记录
          if git diff --staged --quiet; then
            echo "No changes in trial_subscriptions.txt"
          else
            git commit -m "$(date '+%Y-%m-%d %H:%M:%S') trial_sub_update"
          fi
        fi

    - name: 推送更改
      uses: ad-m/github-push-action@master
      with:
        branch: main
        github_token: ${{ secrets.GITHUB_TOKEN }}
