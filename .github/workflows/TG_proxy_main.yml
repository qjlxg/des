name: sub_merge

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'TG_proxy_main.py'
      - '.github/workflows/TG_proxy_main.yml'
  schedule:
    
    - cron: 0 0 1 * *

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: 迁出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取完整历史，方便 rebase
      
    - name: 安装 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 推荐 3.11，速度更快

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        # 必须安装 libgl1 以支持 OpenCV 处理验证码
        sudo apt-get install -y libgl1 libglib2.0-0
        
    - name: 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        # 使用 headless 版 OpenCV 减少环境依赖和体积
        pip install curl_cffi ddddocr urllib3 opencv-python-headless numpy
        
    - name: 执行任务
      run: |
        if [ ! -f "urls.txt" ]; then
          echo "Error: urls.txt not found. Exiting."
          exit 1
        fi
        # 允许脚本报错但不中断工作流（防止个别异常导致文件没保存）
        python ./TG_proxy_main.py || echo "Script finished with some errors"
      
    - name: 提交并推送更改
      run: |
        export TZ='Asia/Shanghai'
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action"
        
        # 记录本次处理的 URL 数量到 Commit Message 中 (可选，方便查看日志)
        URL_COUNT=$(wc -l < urls.txt 2>/dev/null || echo "0")
        
        # 添加所有生成的结果文件
        git add ./report.csv ./subscription.txt ./nodes_plain.txt ./tg.cache 2>/dev/null || echo "No result files found"
        
        if git diff --staged --quiet; then
          echo "没有产生任何变化，跳过提交。"
        else
          git commit -m "$(date '+%Y-%m-%d %H:%M:%S') 自动更新 | 处理量: $URL_COUNT"
          # 自动合并远程更改，确保推送成功
          git pull origin main --rebase -X theirs
          git push origin main
        fi
