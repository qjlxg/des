name: TG_proxy_main

on:
  workflow_dispatch:                    # 手动触发测试
  schedule:
    - cron: "0 2,14 * * *"              # 北京时间约 10:00 和 22:00 执行
  push:
    branches:
      - main
    paths:
      - 'TG_proxy_main.py'
      - 'trial.cfg'
      - '.github/workflows/TG_proxy_main.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write                  # 必须，允许推送缓存和结果文件

    steps:
      - name: 迁出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'                  # 启用 pip 缓存，加快后续运行

      - name: 设置北京时间
        run: sudo timedatectl set-timezone 'Asia/Shanghai'

      - name: 安装系统依赖（解决 OpenCV libGL 报错）
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0

      - name: 安装 Python 依赖（核心修复）
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            curl_cffi \
            ddddocr \
            opencv-python-headless \
            numpy \
            pillow \
            onnxruntime

      - name: 执行机场注册任务
        run: python ./TG_proxy_main.py
        timeout-minutes: 35             # 防止长时间卡住导致失败

      - name: 提交并推送更新（缓存 + 订阅结果）
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 拉取最新代码防止冲突
          git pull origin main --rebase || true

          # 根据你的脚本实际输出文件进行添加（请按需修改）
          git add nodes_plain.txt subscription.txt tg.cache || true  
          # git add nodes_plain.txt subscription.txt tg.cache || true   # 如果有这些文件，取消注释

          # 检查是否有实际变更，避免空提交
          if git diff --staged --quiet; then
            echo "✅ 没有文件变更，跳过提交。"
          else
            git commit -m "$(date '+%Y-%m-%d %H:%M:%S') 自动更新订阅与缓存"
            git push origin main
          fi