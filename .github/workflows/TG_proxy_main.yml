name: TG_proxy_main

on:
  workflow_dispatch: # 手动运行
  schedule:
    - cron: "0 2,14 * * *" # 北京时间 10:00, 22:00
  push:
    branches:
      - main
    paths:
      - 'TG_proxy_main.py'
      - '.github/workflows/TG_proxy_main.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 授予读写权限，防止 push 失败
    permissions:
      contents: write
      
    steps:
    - name: 迁出代码
      uses: actions/checkout@v3

    - name: 安装 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 设置时区
      run: sudo timedatectl set-timezone 'Asia/Shanghai'

    - name: 安装依赖
      run: pip install requests

    - name: 执行任务
      run: python ./TG_proxy_main.py
      
    - name: 提交并推送更改
      run: |
        # 使用 GitHub 官方机器人身份，解决 identity unknown 报错
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git pull origin main
        
        if [ -f "./trial_subscriptions.txt" ]; then
          git add ./trial_subscriptions.txt
          # 检查内容是否有实质性变化
          if git diff --staged --quiet; then
            echo "内容未变动，跳过提交。"
          else
            git commit -m "$(date '+%Y-%m-%d %H:%M:%S') 自动更新试用订阅"
            git push origin main
          fi
        fi
