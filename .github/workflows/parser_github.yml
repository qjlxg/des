name: parser_github

on:
  push:
    paths:
      - 'parser_github.py'
      - '.github/workflows/parser_github.yml'
      - 'sources.txt'
  workflow_dispatch:

jobs:
  run-parser:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install aiohttp aiofiles requests

      - name: 执行脚本
        env:
          TZ: Asia/Shanghai
        run: python parser_github.py

      - name: 提交并推送
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if git diff --staged --quiet; then
            echo "无变动"
          else
            git commit -m "Update nodes: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
