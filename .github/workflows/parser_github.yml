name: parser_github

on:
  push:
    paths:
      - 'parser_github.py'
      - 'sources.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须开启写入权限

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install aiohttp aiofiles requests

      - name: 执行解析与测速
        env:
          TZ: Asia/Shanghai
        run: python parser_github.py

      - name: 提交并推送结果
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 再次确认：不添加巨大的中间文件，只提交结果
          git add url_work.txt
          
          # 如果文件变动则推送
          if git diff --staged --quiet; then
            echo "没有变化，跳过推送。"
          else
            git commit -m "自动更新节点: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
